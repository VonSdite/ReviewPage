server:
  host: 127.0.0.1
  port: 8091
database:
  path: data
logging:
  path: data/logs
  level: INFO
workspace:
  temp_root: data/tmp/reviews
queue:
  poll_interval_seconds: 2
# command_shell:
#   executable: D:/Git/bin/bash.exe
#   args:
#   - -lc
hubs:
  default: gitlab
  gitlab:
    enabled: true
    web_base_url: https://gitlab.example.com
    api_base_url: https://gitlab.example.com/api/v4
    private_token: null
    clone_url_preference: http
    verify_ssl: true
    timeout_seconds: 20
agents:
  default: opencode
  opencode:
    enabled: true
    list_models_command: opencode models
    review_command: opencode run --model "{model}" "/review {review_url}"
    models:
    - opencode/big-pickle
    - opencode/gpt-5-nano
    - opencode/mimo-v2-flash-free
    - opencode/minimax-m2.5-free
    - opencode/nemotron-3-super-free
    - proxy/volc_code/DeepSeek-V3.2
    - proxy/volc_code/Doubao-Seed-2.0-Code
    - proxy/volc_code/Doubao-Seed-2.0-pro
    - proxy/volc_code/GLM-4.7
    - proxy/volc_code/kimi-k2.5
    - proxy/volc_code/MiniMax-M2.5
    - volcengine/ark-code-latest
    - volcengine/kimi-k2.5
    extra_env: {}
