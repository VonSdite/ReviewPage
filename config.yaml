server:
  host: 127.0.0.1
  port: 31944
database:
  path: data
logging:
  path: data/logs
  level: INFO
workspace:
  temp_root: data/tmp/reviews
queue:
  poll_interval_seconds: 2
# 可选：统一指定 Agent 命令使用的 shell。
# 直接写成字符串时，等价于使用该可执行程序并默认追加 args: ["-lc"]。
# command_shell: bash
#
# 也可以写成完整映射：
# command_shell:
#   executable: bash
#   args:
#   - -lc
hubs:
  gitlab_public:
    type: gitlab
    web_base_url: https://gitlab.example.com
    api_base_url: https://gitlab.example.com/api/v4
    private_token: null
    clone_url_preference: http
    verify_ssl: true
    timeout_seconds: 20
  default: gitlab_public
agents:
  opencode:
    list_models_command: opencode models
    review_command: opencode run --model "{model}" "/review {review_url}"
    models:
    - opencode/big-pickle
    - opencode/gpt-5-nano
    - opencode/mimo-v2-flash-free
    - opencode/minimax-m2.5-free
    - opencode/nemotron-3-super-free
    extra_env: {}
    default_model: opencode/big-pickle
  default: opencode
